<style>
@import url('https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.5/dist/web/static/pretendard-dynamic-subset.css');
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Pretendard',sans-serif;color:#111827;background:#f3f4f6;min-height:100vh}

.bfw{width:100%;justify-content:center}
.fg{display:flex;flex-direction:column;gap:5px;margin-bottom:14px}
.fl{font-size:11px;font-weight:600;color:#6b7280}
.fi{height:40px;padding:0 12px;border:1px solid #e5e7eb;border-radius:10px;font-family:inherit;font-size:14px;color:#111827;background:#fff;outline:none;transition:.15s;width:100%}
.fi:focus{border-color:#1C64F2;box-shadow:0 0 0 3px rgba(28,100,242,.1)}
.fsel{appearance:none;-webkit-appearance:none;background-image:url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' fill='none' viewBox='0 0 10 6'%3e%3cpath stroke='%236B7280' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m1 1 4 4 4-4'/%3e%3c/svg%3e");background-position:right 10px center;background-repeat:no-repeat;background-size:.7em;padding-right:30px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.ferr{color:#dc2626;font-size:12px;margin-bottom:10px;display:none}
.tabs{display:flex;border-bottom:1px solid #e5e7eb;margin-bottom:20px}
.tab{padding:10px 18px;font-size:13px;font-weight:600;cursor:pointer;color:#6b7280;border-bottom:2px solid transparent;margin-bottom:-1px;transition:.15s;background:none;border-top:none;border-left:none;border-right:none;font-family:inherit}
.tab.on{color:#1C64F2;border-bottom-color:#1C64F2}.tab:hover{color:#111827}
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:#f3f4f6;padding:10px 12px;text-align:left;font-weight:600;color:#6b7280;border-bottom:1px solid #e5e7eb;white-space:nowrap}
td{padding:10px 12px;border-bottom:1px solid #f3f4f6;vertical-align:middle}
tr:last-child td{border-bottom:none}
.sg{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}
.sb{padding:7px 14px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#111827;transition:.15s;font-family:inherit}
.sb:hover:not(:disabled){border-color:#1C64F2;color:#1C64F2;background:#eff6ff}
.sb.bk{background:#f3f4f6;color:#d1d5db;cursor:default;border-color:#f3f4f6;text-decoration:line-through}
.sb.sl{background:#1C64F2;color:#fff;border-color:#1C64F2}
.sb.mn{background:#dcfce7;color:#15803d;border-color:#86efac;cursor:default}
.dtabs{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.dt{padding:7px 14px;border-radius:10px;font-size:13px;font-weight:600;cursor:pointer;border:1.5px solid #e5e7eb;background:#fff;color:#6b7280;transition:.15s;font-family:inherit}
.dt.on{background:#1C64F2;color:#fff;border-color:#1C64F2}.dt:hover:not(.on){border-color:#1C64F2;color:#1C64F2}
.bx{display:inline-flex;align-items:center;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:600}
.bb{background:#dbeafe;color:#1d4ed8}.bg{background:#dcfce7;color:#15803d}
.br{background:#fee2e2;color:#dc2626}.bgr{background:#f3f4f6;color:#6b7280}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.15)}
.sh{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.shtitle{font-size:16px;font-weight:700}
.info{background:#eff6ff;border:1px solid #bfdbfe;border-radius:10px;padding:12px 14px}
.info p{font-size:12px;color:#1d4ed8;font-weight:500}
.stgrid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
.stcard{background:#f9fafb;border-radius:10px;padding:14px}
.stcard .slabel{font-size:11px;font-weight:600;color:#6b7280;margin-bottom:4px}
.stcard .sval{font-size:20px;font-weight:800}
.sc-tbl{width:100%;border-collapse:collapse;font-size:12px}
.sc-tbl td{border:1px solid #d1d5db;text-align:center;vertical-align:middle;height:32px;padding:2px 4px}
.sc-tbl .hd{background:#f3f4f6;font-size:11px;font-weight:600;color:#374151}
.sc-tbl .rh{background:#f9fafb;font-size:11px;font-weight:600;color:#374151;width:13%}
.sc-tbl .vl{font-size:13px;font-weight:700}
.sc-tbl .ec{background:#fafafa}
.sc-tbl .dl{background:linear-gradient(to top right,transparent calc(50% - 0.5px),#d1d5db calc(50% - 0.5px),#d1d5db calc(50% + 0.5px),transparent calc(50% + 0.5px))}
.ta{height:auto;padding:10px;resize:vertical;min-height:90px}
.spin{width:30px;height:30px;border:3px solid #e5e7eb;border-top-color:#1C64F2;border-radius:50%;animation:spin .7s linear infinite;margin:0 auto}
@keyframes spin{to{transform:rotate(360deg)}}
@media print{.np{display:none!important}.po{display:block!important}.topbar,.tabs{display:none!important}body{background:white}}
.po{display:none}
code{font-size:11px;background:#f3f4f6;padding:2px 6px;border-radius:4px;font-family:monospace}
.empty{text-align:center;padding:36px 20px;color:#9ca3af;font-size:13px}

<body>

<!-- 로딩 -->
<div id="vLoad" style="position:fixed;inset:0;background:rgba(255,255,255,.92);display:flex;align-items:center;justify-content:center;z-index:9999">
  <div style="text-align:center"><div class="spin"></div><p style="color:#6b7280;font-size:13px;margin-top:12px">잠시 기다려주세요</p></div>
</div>

<!-- 최초 설정 -->
<div id="vSetup" class="lwrap hidden">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:28px">
      <span class="chip" style="font-size:12px;padding:4px 10px">최초 설정</span>
      <p style="font-size:20px;font-weight:800;margin-top:10px">관리자 계정 생성</p>
      <p style="font-size:13px;color:#6b7280;margin-top:6px">처음 사용 시 최초 관리자 계정을 생성해주세요.</p>
    </div>
    <div class="card">
      <div class="fg"><label class="fl">관리자 ID</label><input class="fi" id="setupId" placeholder="admin" onkeydown="if(event.key==='Enter')createFirstAdmin()"></div>
      <div class="fg"><label class="fl">이름</label><input class="fi" id="setupName" placeholder="김재희" onkeydown="if(event.key==='Enter')createFirstAdmin()"></div>
      <div class="fg"><label class="fl">비밀번호 (6자 이상)</label><input class="fi" id="setupPw" type="password" placeholder="비밀번호" onkeydown="if(event.key==='Enter')createFirstAdmin()"></div>
      <div class="fg" style="margin-bottom:20px"><label class="fl">비밀번호 확인</label><input class="fi" id="setupPw2" type="password" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter')createFirstAdmin()"></div>
      <div class="ferr" id="setupErr"></div>
      <button class="btn bp bfw" onclick="createFirstAdmin()">관리자 계정 생성</button>
    </div>
  </div>
</div>

<!-- 로그인 -->
<div id="vLogin" class="lwrap hidden">
  <div style="width:100%;max-width:380px">
    <div style="text-align:center;margin-bottom:28px">
      <div style="display:inline-flex;align-items:center;gap:8px;margin-bottom:10px">
        <span class="chip">2027 6평</span><span style="font-size:20px;font-weight:800">모의평가 컨설팅</span>
      </div>
      <p style="font-size:13px;color:#6b7280">로그인 후 상담 예약을 진행하세요</p>
    </div>
    <div class="card">
      <div class="fg"><label class="fl">아이디</label><input class="fi" id="lId" placeholder="아이디 입력" autocomplete="username" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="fg" style="margin-bottom:20px"><label class="fl">비밀번호</label><input class="fi" id="lPw" type="password" placeholder="비밀번호 입력" autocomplete="current-password" onkeydown="if(event.key==='Enter')doLogin()"></div>
      <div class="ferr" id="lErr"></div>
      <button class="btn bp bfw" onclick="doLogin()">로그인</button>
    </div>
  </div>
</div>

<!-- 비밀번호 변경 -->
<div id="vCpw" class="hidden">
  <div class="topbar"><div class="tl"><span class="chip">2027 6평</span><span class="tname">모의평가 컨설팅</span></div></div>
  <div class="page-sm">
    <div class="card">
      <p style="font-size:16px;font-weight:700;margin-bottom:4px">비밀번호 변경 필요</p>
      <p style="font-size:13px;color:#6b7280;margin-bottom:20px">초기 비밀번호를 변경해야 서비스를 이용할 수 있습니다.</p>
      <div class="fg"><label class="fl">새 비밀번호 (6자 이상)</label><input class="fi" id="pw1" type="password" placeholder="새 비밀번호" onkeydown="if(event.key==='Enter')doChangePw()"></div>
      <div class="fg" style="margin-bottom:20px"><label class="fl">비밀번호 확인</label><input class="fi" id="pw2" type="password" placeholder="비밀번호 재입력" onkeydown="if(event.key==='Enter')doChangePw()"></div>
      <div class="ferr" id="pwErr"></div>
      <button class="btn bp bfw" onclick="doChangePw()">변경 완료</button>
    </div>
  </div>
</div>

<!-- 학생 뷰 -->
<div id="vStu" class="hidden">
  <div class="topbar">
    <div class="tl"><span class="chip">2027 6평</span><span class="tname">모의평가 컨설팅</span></div>
    <div class="tr"><span class="uname" id="stuUname"></span><button class="btn bs bsm" onclick="doLogout()">로그아웃</button></div>
  </div>
  <div class="page" style="max-width:660px"><div id="stuC"></div></div>
</div>

<!-- 관리자/뷰어 뷰 -->
<div id="vAdmin" class="hidden">
  <div class="topbar np">
    <div class="tl"><span class="chip">2027 6평</span><span class="tname">모의평가 컨설팅</span><span class="trole" id="adminRoleLabel"></span></div>
    <div class="tr"><span class="uname" id="adminUname"></span><button class="btn bs bsm" onclick="doLogout()">로그아웃</button></div>
  </div>
  <div class="page">
    <div class="tabs np" id="adminTabs"></div>
    <div id="adminC"></div>
  </div>
</div>

<!-- 모달 -->
<div id="mOv" class="overlay hidden" onclick="if(event.target===this)closeModal()">
  <div class="modal" id="mCt"></div>
</div>

<script>
firebase.initializeApp({
  apiKey:"AIzaSyAMWkjpZ_5Jp3odzEfoclkWhZ4VU6uXxCE",
  authDomain:"consulting-dd53f.firebaseapp.com",
  projectId:"consulting-dd53f",
  storageBucket:"consulting-dd53f.firebasestorage.app",
  messagingSenderId:"226684451545",
  appId:"1:226684451545:web:2c495b64e538e31c0f1cc8"
});
const db = firebase.firestore();

const EXCL = ['12:00','12:30','18:00','18:30'];
const DFLT_DATES = [
  {id:'d1',date:'2026-06-05',label:'6월 5일 (금)',slots:[]},
  {id:'d2',date:'2026-06-06',label:'6월 6일 (토)',slots:[]},
  {id:'d3',date:'2026-06-07',label:'6월 7일 (일)',slots:[]},
  {id:'d4',date:'2026-06-08',label:'6월 8일 (월)',slots:[]},
];

const S = {
  user:null, studentDocId:null,
  students:[], schedule:{dates:JSON.parse(JSON.stringify(DFLT_DATES))},
  bookings:[], config:{scoreStart:'',scoreEnd:''},
  admins:[],
  tab:null, selDate:null, adminSel:null,
  editingScore:false, lang2Open:false, marchEditingScore:false, stuSort:'seat'
};

const _=id=>document.getElementById(id);
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function fmtPhone(p){const d=p.replace(/\D/g,'');if(d.length===11)return d.slice(0,3)+'-'+d.slice(3,7)+'-'+d.slice(7);if(d.length===10)return d.slice(0,3)+'-'+d.slice(3,6)+'-'+d.slice(6);return p;}
function fmtSchool(s){s=s.trim();if(s.endsWith('고')&&!s.endsWith('등학교'))return s+'등학교';return s;}
function acctId(name,phone){return name+phone.replace(/\D/g,'').slice(-4);}
function initPw(phone){return phone.replace(/\D/g,'');}
function showErr(id,msg){const el=_(id);if(el){el.textContent=msg;el.style.display='block';}}
function hideErr(id){const el=_(id);if(el)el.style.display='none';}
function fmtPhoneInput(el){let v=el.value.replace(/\D/g,'').slice(0,11);if(v.length>7)el.value=v.slice(0,3)+'-'+v.slice(3,7)+'-'+v.slice(7);else if(v.length>3)el.value=v.slice(0,3)+'-'+v.slice(3);else el.value=v;}
function isScoreOpen(){if(!S.config.scoreStart)return false;const t=new Date().toISOString().slice(0,10);if(S.config.scoreEnd)return t>=S.config.scoreStart&&t<=S.config.scoreEnd;return t>=S.config.scoreStart;}
function isMarchScoreOpen(){if(!S.config.marchScoreStart)return false;const t=new Date().toISOString().slice(0,10);if(S.config.marchScoreEnd)return t>=S.config.marchScoreStart&&t<=S.config.marchScoreEnd;return t>=S.config.marchScoreStart;}
function showLoad(v){_('vLoad').style.display=v?'flex':'none';}

function showView(id){
  ['vSetup','vLogin','vCpw','vStu','vAdmin'].forEach(v=>{
    const el=_(v);el.classList.toggle('hidden',v!==id);
    if(['vSetup','vLogin'].includes(v))el.style.display=v===id?'flex':'none';
  });
}

/* ── DATA ── */
async function loadAll(){
  showLoad(true);
  try{
    const[stuSnap,scSnap,cfgSnap,bkSnap]=await Promise.all([
      db.collection('students').get(),
      db.collection('schedule').doc('main').get(),
      db.collection('config').doc('main').get(),
      db.collection('bookings').get()
    ]);
    S.students=stuSnap.docs.map(d=>({_docId:d.id,...d.data()}));
    S.schedule=scSnap.exists?scSnap.data():{dates:JSON.parse(JSON.stringify(DFLT_DATES))};
    if(!S.schedule.dates)S.schedule.dates=JSON.parse(JSON.stringify(DFLT_DATES));
    S.config=cfgSnap.exists?cfgSnap.data():{scoreStart:'',scoreEnd:''};
    S.bookings=bkSnap.docs.map(d=>({_docId:d.id,...d.data()}));
  }catch(e){alert('데이터 로딩 실패: '+e.message);}
  showLoad(false);
}
async function loadAdmins(){
  const snap=await db.collection('admins').get();
  S.admins=snap.docs.map(d=>({_docId:d.id,...d.data()}));
}
async function saveScheduleToDb(){await db.collection('schedule').doc('main').set(S.schedule);}

/* ── AUTH ── */
async function doLogin(){
  const id=_('lId').value.trim(),pw=_('lPw').value;
  hideErr('lErr');
  if(!id||!pw){showErr('lErr','아이디와 비밀번호를 입력하세요.');return;}
  showLoad(true);
  try{
    const adminDoc=await db.collection('admins').doc(id).get();
    if(adminDoc.exists){
      const a=adminDoc.data();
      if(a.password!==pw){showLoad(false);showErr('lErr','비밀번호가 올바르지 않습니다.');return;}
      S.user={type:a.role,id:a.id,name:a.name};
      await loadAll();
      _('adminUname').textContent=a.name;
      _('adminRoleLabel').textContent=a.role==='admin'?'ADMIN':'OP';
      showView('vAdmin');
      setTab(a.role==='admin'?'students':'bookings');
      return;
    }
    const stuQ=await db.collection('students').where('accountId','==',id).get();
    if(!stuQ.empty){
      const stuDoc=stuQ.docs[0],stu=stuDoc.data();
      if(stu.accountPw!==pw){showLoad(false);showErr('lErr','비밀번호가 올바르지 않습니다.');return;}
      S.user={type:'student',id,name:stu.name};
      S.studentDocId=stuDoc.id;
      await loadAll();
      if(stu.isFirstLogin){showLoad(false);showView('vCpw');return;}
      _('stuUname').textContent=stu.name+' 학생';
      showView('vStu');renderStu();return;
    }
    showErr('lErr','아이디 또는 비밀번호가 올바르지 않습니다.');
  }catch(e){showErr('lErr','오류: '+e.message);}
  showLoad(false);
}

function doLogout(){
  S.user=null;S.studentDocId=null;S.editingScore=false;S.lang2Open=false;S.marchEditingScore=false;
  _('lId').value='';_('lPw').value='';hideErr('lErr');showView('vLogin');
}

async function doChangePw(){
  const p1=_('pw1').value,p2=_('pw2').value;hideErr('pwErr');
  if(p1.length<6){showErr('pwErr','6자 이상 입력하세요.');return;}
  if(p1!==p2){showErr('pwErr','비밀번호가 일치하지 않습니다.');return;}
  showLoad(true);
  try{
    await db.collection('students').doc(S.studentDocId).update({accountPw:p1,isFirstLogin:false});
    const s=S.students.find(x=>x._docId===S.studentDocId);if(s){s.accountPw=p1;s.isFirstLogin=false;}
    _('stuUname').textContent=S.user.name+' 학생';showView('vStu');renderStu();
  }catch(e){showErr('pwErr','저장 실패: '+e.message);}
  showLoad(false);
}

async function createFirstAdmin(){
  const id=_('setupId').value.trim(),name=_('setupName').value.trim();
  const pw=_('setupPw').value,pw2=_('setupPw2').value;hideErr('setupErr');
  if(!id||!name||!pw){showErr('setupErr','모든 항목을 입력하세요.');return;}
  if(pw.length<6){showErr('setupErr','비밀번호는 6자 이상이어야 합니다.');return;}
  if(pw!==pw2){showErr('setupErr','비밀번호가 일치하지 않습니다.');return;}
  showLoad(true);
  try{
    await db.collection('admins').doc(id).set({id,name,password:pw,role:'admin',createdAt:Date.now()});
    showLoad(false);alert('관리자 계정이 생성되었습니다.');showView('vLogin');
  }catch(e){showLoad(false);showErr('setupErr','Firestore 오류: '+e.message);}
}

/* ── STUDENT ── */
function renderStu(){
  const myB=S.bookings.find(b=>b.studentId===S.studentDocId);
  const myStu=S.students.find(s=>s._docId===S.studentDocId);
  if(myB){_('stuC').innerHTML=bookCardHtml(myB)+marchScoreCardHtml(myStu)+scoreCardHtml(myStu)+qCardHtml(myB);}

async function bookSlot(dateId,slot){

function updPrev(){const name=_('sn')?.value.trim(),phone=_('sp')?.value||'',d=phone.replace(/\D/g,'');const prev=_('aprev'),pid=_('prevId');if(prev&&pid&&name&&d.length>=4){pid.textContent=acctId(name,d);prev.style.display='block';}}

async function saveStu(docId){
  const name=_('sn').value.trim(),grade=_('sg').value,school=fmtSchool(_('ss').value),phone=fmtPhone(_('sp').value),gphone=fmtPhone(_('sgp').value),memo=_('sm').value.trim(),seat=_('sseat').value?Number(_('sseat').value):'';
  if(!name||!school||!phone||!gphone){showErr('mErr','필수 항목을 모두 입력하세요.');return;}
  const d=phone.replace(/\D/g,'');if(d.length!==11){showErr('mErr','학생 연락처는 11자리로 입력하세요.');return;}
  const aid=acctId(name,d);
  if(S.students.find(s=>s.accountId===aid&&s._docId!==docId)){showErr('mErr',`계정 ID '${aid}'가 이미 존재합니다.`);return;}
  if(seat&&S.students.find(s=>s.seat===seat&&s._docId!==docId)){const dup=S.students.find(s=>s.seat===seat&&s._docId!==docId);showErr('mErr',`${seat}번 좌석은 이미 '${dup.name}' 학생에게 배정되어 있습니다.`);return;}
  showLoad(true);
  try{
    if(docId){
      await db.collection('students').doc(docId).update({name,grade,school,studentPhone:phone,guardianPhone:gphone,memo,seat,accountId:aid});
      const s=S.students.find(x=>x._docId===docId);if(s)Object.assign(s,{name,grade,school,studentPhone:phone,guardianPhone:gphone,memo,seat,accountId:aid});
    }else{
      const data={name,grade,school,studentPhone:phone,guardianPhone:gphone,memo,seat,accountId:aid,accountPw:initPw(phone),isFirstLogin:true};
      const ref=await db.collection('students').add(data);S.students.push({_docId:ref.id,...data});
    }
    closeModal();renderAdminStudents();
  }catch(e){showErr('mErr','저장 실패: '+e.message);}
  showLoad(false);}

async function delStu(docId){
  const s=S.students.find(x=>x._docId===docId);if(!s||!confirm(`'${s.name}' 학생을 삭제하시겠습니까?`))return;
  showLoad(true);
  try{
    await db.collection('students').doc(docId).delete();
    const related=S.bookings.filter(b=>b.studentId===docId);
    for(const b of related)await db.collection('bookings').doc(b._docId).delete();
    S.students=S.students.filter(x=>x._docId!==docId);S.bookings=S.bookings.filter(b=>b.studentId!==docId);
    renderAdminStudents();
  }catch(e){alert('삭제 실패: '+e.message);}
  showLoad(false);}

async function resetPw(docId){
  const s=S.students.find(x=>x._docId===docId);if(!s||!confirm(`'${s.name}' 학생의 비밀번호를 초기화하시겠습니까?`))return;
  const newPw=initPw(s.studentPhone);showLoad(true);
  try{await db.collection('students').doc(docId).update({accountPw:newPw,isFirstLogin:true});s.accountPw=newPw;s.isFirstLogin=true;closeModal();alert(`초기 비밀번호: ${newPw}`);renderAdminStudents();}
  catch(e){alert('초기화 실패: '+e.message);}

async function confirmEditDate(id){
  const label=_('dl').value.trim(),newDate=_('dd').value;if(!label||!newDate){showErr('mErr','모두 입력하세요.');return;}
  const d=S.schedule.dates.find(x=>x.id===id);if(!d)return;
  const oldDate=d.date,related=S.bookings.filter(b=>b.date===oldDate);
  d.label=label;d.date=newDate;related.forEach(b=>{b.date=newDate;b.dateLabel=label;});
  showLoad(true);try{await saveScheduleToDb();for(const b of related)await db.collection('bookings').doc(b._docId).update({date:newDate,dateLabel:label});closeModal();renderAdminSchedule();}catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);}

async function rmDate(id){
  const d=S.schedule.dates.find(x=>x.id===id);if(!d||!confirm(`'${d.label}'를 삭제하시겠습니까? 관련 예약도 삭제됩니다.`))return;
  const related=S.bookings.filter(b=>b.date===d.date);S.schedule.dates=S.schedule.dates.filter(x=>x.id!==id);
  showLoad(true);try{await saveScheduleToDb();for(const b of related)await db.collection('bookings').doc(b._docId).delete();S.bookings=S.bookings.filter(b=>b.date!==d.date);renderAdminSchedule();}catch(e){alert('삭제 실패: '+e.message);}showLoad(false);}

async function addSlot(dateId){
  const val=document.getElementById('at-'+dateId)?.value;if(!val){alert('시간을 선택하세요.');return;}
  const d=S.schedule.dates.find(x=>x.id===dateId);if(!d)return;
  if(d.slots.includes(val)){alert('이미 추가된 시간입니다.');return;}
  d.slots.push(val);d.slots.sort();showLoad(true);try{await saveScheduleToDb();renderAdminSchedule();}catch(e){alert('저장 실패: '+e.message);}showLoad(false);}

async function rmSlot(dateId,slot){
  const d=S.schedule.dates.find(x=>x.id===dateId);if(!d)return;
  const bk=S.bookings.find(b=>b.date===d.date&&b.slot===slot);
  if(bk&&!confirm(`${slot}에 ${bk.studentName} 학생이 예약되어 있습니다. 삭제하시겠습니까?`))return;
  d.slots=d.slots.filter(s=>s!==slot);showLoad(true);
  try{await saveScheduleToDb();if(bk){await db.collection('bookings').doc(bk._docId).delete();S.bookings=S.bookings.filter(b=>b._docId!==bk._docId);}renderAdminSchedule();}
  catch(e){alert('저장 실패: '+e.message);}showLoad(false);}

function openBulk(dateId){_('mCt').innerHTML=`<p style="font-size:16px;font-weight:700;margin-bottom:4px">시간대 일괄 추가</p>

  <p style="font-size:11px;color:#9ca3af;margin-bottom:16px">⚠ 12:00, 12:30, 18:00, 18:30은 자동으로 제외됩니다.</p>
  <input type="hidden" id="bid" value="${dateId}">
  <div class="frow"><div class="fg"><label class="fl">시작 시간</label><input class="fi" id="bs" type="time" value="09:00"></div><div class="fg"><label class="fl">종료 시간 (미포함)</label><input class="fi" id="be" type="time" value="19:00"></div></div>

  <div style="display:flex;gap:8px"><button class="btn bs" style="flex:1" onclick="closeModal()">취소</button><button class="btn bp" style="flex:1" onclick="doBulk()">추가</button></div>`;openModal();}

async function doBulk(){
  const dateId=_('bid').value,start=_('bs').value,end=_('be').value;
  if(!start||!end||start>=end){showErr('mErr','올바른 시간 범위를 입력하세요.');return;}
  const d=S.schedule.dates.find(x=>x.id===dateId);if(!d)return;
  let [h,m]=start.split(':').map(Number);const [eh,em]=end.split(':').map(Number),endMin=eh*60+em;
  let added=0,skipped=0;
  while(h*60+m<endMin){const sl=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;if(EXCL.includes(sl))skipped++;else if(!d.slots.includes(sl)){d.slots.push(sl);added++;}m+=30;if(m>=60){m-=60;h++;}}
  d.slots.sort();showLoad(true);try{await saveScheduleToDb();closeModal();renderAdminSchedule();alert(`${added}개 추가됨${skipped?` (${skipped}개 제외)`:''}`);} catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);}

function renderAdminSlots(){

async function saveAcct(accId){
  const name=_('acname').value.trim(),role=_('acrole').value,pw=_('acpw')?.value;
  if(!name){showErr('mErr','이름을 입력하세요.');return;}
  if(accId){
    const update={name,role};if(pw){if(pw.length<6){showErr('mErr','비밀번호는 6자 이상이어야 합니다.');return;}update.password=pw;}
    showLoad(true);try{await db.collection('admins').doc(accId).update(update);const a=S.admins.find(x=>x.id===accId);if(a)Object.assign(a,update);closeModal();renderAdminAccounts();}catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);
  }else{
    const id=_('acid').value.trim();if(!id){showErr('mErr','ID를 입력하세요.');return;}if(!pw||pw.length<6){showErr('mErr','비밀번호는 6자 이상이어야 합니다.');return;}
    showLoad(true);
    try{
      const exists=await db.collection('admins').doc(id).get();if(exists.exists){showErr('mErr',`ID '${id}'가 이미 존재합니다.`);showLoad(false);return;}
      const data={id,name,role,password:pw,createdAt:Date.now()};
      await db.collection('admins').doc(id).set(data);S.admins.push({_docId:id,...data});closeModal();renderAdminAccounts();
    }catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);}
}

async function delAcct(id){
  if(id===S.user.id){alert('본인 계정은 삭제할 수 없습니다.');return;}
  if(!confirm(`'${id}' 계정을 삭제하시겠습니까?`))return;
  showLoad(true);try{await db.collection('admins').doc(id).delete();S.admins=S.admins.filter(x=>x.id!==id);renderAdminAccounts();}catch(e){alert('삭제 실패: '+e.message);}showLoad(false);}

/* ── MODAL ── */
function openModal(){const ov=_('mOv');ov.classList.remove('hidden');ov.style.display='flex';}
function closeModal(){const ov=_('mOv');ov.classList.add('hidden');ov.style.display='none';}

/* ── INIT ── */
async function init(){
  showLoad(true);
  try{
    const snap=await db.collection('admins').limit(1).get();
    showLoad(false);
    if(snap.empty)showView('vSetup');else showView('vLogin');
  }catch(e){
    _('vLoad').innerHTML=`<div style="text-align:center;padding:40px"><p style="font-size:16px;font-weight:700;color:#dc2626;margin-bottom:8px">Firestore 연결 실패</p><p style="font-size:13px;color:#6b7280">${e.message}</p><p style="font-size:12px;color:#9ca3af;margin-top:8px">Firebase 콘솔에서 Firestore 규칙을 확인해주세요.</p></div>`;
    _('vLoad').style.display='flex';}
}
init();
</script>
