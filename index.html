    ['국어',['화법과 작문','언어와 매체'],100],
    ['수학',['확률과 통계','미적분','기하'],100],
    ['사회탐구',['생활과 윤리','윤리와 사상','한국지리','세계지리','동아시아사','세계사','경제','정치와 법','사회·문화'],50],
    ['과학탐구',sci2?['물리학Ⅰ','화학Ⅰ','생명과학Ⅰ','지구과학Ⅰ','물리학Ⅱ','화학Ⅱ','생명과학Ⅱ','지구과학Ⅱ']:['물리학Ⅰ','화학Ⅰ','생명과학Ⅰ','지구과학Ⅰ'],50]
  ];
}
function gcAllRel(exam){return gcRelGroups(exam).flatMap(([,s])=>s);}

function calcGrade(raw,cuts){
  if(!cuts||!cuts.length||raw===''||raw===undefined||raw===null)return '';
  const r=Number(raw);if(isNaN(r))return '';
  for(let i=0;i<cuts.length;i++){if(r>=Number(cuts[i]))return String(i+1);}
  return '9';
}
function getExamGrade(exam,subj,raw){
  if(!exam||!exam.gradeCuts||!subj||raw===''||raw===undefined)return '';
  const cuts=exam.gradeCuts[subj];return cuts?calcGrade(raw,cuts):'';
}
function getAbsGrade(type,raw){
  const gc=S.config.gradeCuts;if(!gc||!gc.abs||raw===''||raw===undefined)return '';
  const cuts=gc.abs[type];return cuts?calcGrade(raw,cuts):'';
}
function examGradeCell(exam,subj,raw){
  const g=getExamGrade(exam,subj,raw);
  return g?`<td class="vl">${g}</td>`:'<td class="dl"></td>';
}
function absGradeCell(type,raw){
  const g=getAbsGrade(type,raw);
  return g?`<td class="vl">${g}</td>`:'<td class="vl">—</td>';
}

async function loadAll(){
  showLoad(true);
  try{
    const[stuSnap,scSnap,cfgSnap,bkSnap,reqSnap]=await Promise.all([
      db.collection('students').get(),
      db.collection('schedule').doc('main').get(),
      db.collection('config').doc('main').get(),
      db.collection('bookings').get(),
      db.collection('requests').get()
    ]);
    S.students=stuSnap.docs.map(d=>({_docId:d.id,...d.data()}));
    S.schedule=scSnap.exists?scSnap.data():{dates:JSON.parse(JSON.stringify(DFLT_DATES))};
    if(!S.schedule.dates)S.schedule.dates=JSON.parse(JSON.stringify(DFLT_DATES));
    S.config=cfgSnap.exists?cfgSnap.data():{};
    if(!S.config.exams){
      S.config.exams=[];
      if(S.config.marchScoreStart||S.config.marchScoreEnd){S.config.exams.push({id:'exam_march',name:'3월 모의고사',scoreStart:S.config.marchScoreStart||'',scoreEnd:S.config.marchScoreEnd||'',hasLang2:false,hasScienceII:false,gradeCuts:S.config.gradeCuts?.march||{}});}
      if(S.config.scoreStart||S.config.scoreEnd){S.config.exams.push({id:'exam_june',name:'6월 모의평가',scoreStart:S.config.scoreStart||'',scoreEnd:S.config.scoreEnd||'',hasLang2:true,hasScienceII:true,gradeCuts:S.config.gradeCuts?.june||{}});}
    }
    if(!S.config.gradeCuts)S.config.gradeCuts={};
    if(!S.config.gradeCuts.abs)S.config.gradeCuts.abs={};
    S.students.forEach(stu=>{
      if(!stu.scores)stu.scores={};
      if(stu.marchScore&&Object.values(stu.marchScore).some(v=>v)&&!stu.scores.exam_march)stu.scores.exam_march=stu.marchScore;
      if(stu.score&&Object.values(stu.score).some(v=>v)&&!stu.scores.exam_june)stu.scores.exam_june=stu.score;
    });
    S.bookings=bkSnap.docs.map(d=>({_docId:d.id,...d.data()}));
    S.requests=reqSnap.docs.map(d=>({_docId:d.id,...d.data()}));
  }catch(e){alert('데이터 로딩 실패: '+e.message);}
  showLoad(false);
}

async function doLogin(){
  const id=_('lId').value.trim(),pw=_('lPw').value;
  hideErr('lErr');
  if(!id||!pw){showErr('lErr','아이디와 비밀번호를 입력하세요.');return;}
  showLoad(true);
  try{
    const adminDoc=await db.collection('admins').doc(id).get();
    if(adminDoc.exists){
      const a=adminDoc.data();
      if(a.password!==pw){showLoad(false);showErr('lErr','비밀번호가 올바르지 않습니다.');return;}
      S.user={type:a.role,id:a.id,name:a.name};
      sessionStorage.setItem('session',JSON.stringify({type:a.role,id:a.id,name:a.name}));
      await loadAll();
      _('adminUname').textContent=a.name;
      _('adminRoleLabel').textContent=a.role==='admin'?'ADMIN':'OP';
      showView('vAdmin');
      setTab(a.role==='admin'?'students':'bookings');
      return;
    }
    const stuQ=await db.collection('students').where('accountId','==',id).get();
    if(!stuQ.empty){
      const stuDoc=stuQ.docs[0],stu=stuDoc.data();
      if(stu.accountPw!==pw){showLoad(false);showErr('lErr','비밀번호가 올바르지 않습니다.');return;}
      S.user={type:'student',id,name:stu.name};
      S.studentDocId=stuDoc.id;
      sessionStorage.setItem('session',JSON.stringify({type:'student',id,name:stu.name,studentDocId:stuDoc.id}));
      await loadAll();
      if(stu.isFirstLogin){showLoad(false);showView('vCpw');return;}
      _('stuUname').textContent=stu.name+' 학생';
      showView('vStu');renderStu();return;
    }
    showErr('lErr','아이디 또는 비밀번호가 올바르지 않습니다.');
  }catch(e){showErr('lErr','오류: '+e.message);}
  showLoad(false);
}

  return [
    {key:'kor',label:'국어',getGrade:(ex,sc)=>sc?.korGrade||getExamGrade(ex,sc?.korSubj,sc?.korRaw)},
    {key:'mat',label:'수학',getGrade:(ex,sc)=>sc?.matGrade||getExamGrade(ex,sc?.matSubj,sc?.matRaw)},

    {key:'exp1',label:exp1Name,getGrade:(ex,sc)=>sc?.exp1Grade||getExamGrade(ex,sc?.exp1Subj,sc?.exp1Raw)},
    {key:'exp2',label:exp2Name,getGrade:(ex,sc)=>sc?.exp2Grade||getExamGrade(ex,sc?.exp2Subj,sc?.exp2Raw)},
  ];
}

function drawGradeGraph(exams,stu,subjInfo){
  const W=560,H=200,PL=36,PR=16,PT=16,PB=28;
  const cw=W-PL-PR,ch=H-PT-PB;
  const pts=[];
  exams.forEach((ex,i)=>{
    const sc=getStuExamScore(stu,ex.id);
    const g=sc?subjInfo.getGrade(ex,sc):'';
    if(g&&Number(g)>=1&&Number(g)<=9){
      const x=PL+(exams.length>1?i*(cw/(exams.length-1)):cw/2);
      const y=PT+(Number(g)-1)*(ch/8);
      pts.push({x,y,g:Number(g),exam:ex.name});
    }
  });
  let gridLines='';
  for(let g=1;g<=9;g++){
    const y=PT+(g-1)*(ch/8);
    gridLines+=`<line x1="${PL}" y1="${y}" x2="${W-PR}" y2="${y}" stroke="#f0f0f0" stroke-width="1"/>`;
    gridLines+=`<text x="${PL-8}" y="${y+4}" text-anchor="end" font-size="10" fill="#9ca3af" font-weight="600">${g}</text>`;
  }
  let xLabels='';
  exams.forEach((ex,i)=>{
    const x=PL+(exams.length>1?i*(cw/(exams.length-1)):cw/2);
    xLabels+=`<text x="${x}" y="${H-6}" text-anchor="middle" font-size="10" fill="#9ca3af" font-weight="600">${ex.name.replace(/\s*모의.*$/,'')}</text>`;
    gridLines+=`<line x1="${x}" y1="${PT}" x2="${x}" y2="${H-PB}" stroke="#f0f0f0" stroke-width="1"/>`;
  });
  let path='',dots='';
  if(pts.length>1){
    let d=`M${pts[0].x},${pts[0].y}`;
    for(let i=1;i<pts.length;i++){
      const cp=(pts[i].x-pts[i-1].x)*0.3;
      d+=` C${pts[i-1].x+cp},${pts[i-1].y} ${pts[i].x-cp},${pts[i].y} ${pts[i].x},${pts[i].y}`;
    }
    path=`<path d="${d}" fill="none" stroke="#1C64F2" stroke-width="2.5" stroke-linecap="round"/>`;
  }else if(pts.length===1){
    path='';
  }
  pts.forEach(p=>{
    dots+=`<circle cx="${p.x}" cy="${p.y}" r="4.5" fill="#fff" stroke="#1C64F2" stroke-width="2.5"/>`;
    dots+=`<text x="${p.x}" y="${p.y-10}" text-anchor="middle" font-size="10" fill="#1C64F2" font-weight="700">${p.g}등급</text>`;
  });
  if(!pts.length)return `<div style="text-align:center;padding:30px;color:#9ca3af;font-size:13px">입력된 성적이 없습니다.</div>`;
  return `<div style="overflow-x:auto"><svg viewBox="0 0 ${W} ${H}" style="width:100%;max-width:${W}px;height:auto">${gridLines}${xLabels}${path}${dots}</svg></div>`;
}

async function saveStu(docId){
  const name=_('sn').value.trim(),grade=_('sg').value,school=fmtSchool(_('ss').value),phone=fmtPhone(_('sp').value),gphone=fmtPhone(_('sgp').value),memo=_('sm').value.trim(),seat=_('sseat').value?Number(_('sseat').value):'';
  if(!name||!school||!phone||!gphone){showErr('mErr','필수 항목을 모두 입력하세요.');return;}
  const d=phone.replace(/\D/g,'');if(d.length!==11){showErr('mErr','학생 연락처는 11자리로 입력하세요.');return;}
  const aid=acctId(name,d);
  if(S.students.find(s=>s.accountId===aid&&s._docId!==docId)){showErr('mErr',`계정 ID '${aid}'가 이미 존재합니다.`);return;}
  if(seat&&S.students.find(s=>s.seat===seat&&s._docId!==docId)){const dup=S.students.find(s=>s.seat===seat&&s._docId!==docId);showErr('mErr',`${seat}번 좌석은 이미 '${dup.name}' 학생에게 배정되어 있습니다.`);return;}
  showLoad(true);
  try{
    if(docId){
      await db.collection('students').doc(docId).update({name,grade,school,studentPhone:phone,guardianPhone:gphone,memo,seat,accountId:aid});
      const s=S.students.find(x=>x._docId===docId);if(s)Object.assign(s,{name,grade,school,studentPhone:phone,guardianPhone:gphone,memo,seat,accountId:aid});
    }else{
      const data={name,grade,school,studentPhone:phone,guardianPhone:gphone,memo,seat,accountId:aid,accountPw:initPw(phone),isFirstLogin:true};
      const ref=await db.collection('students').add(data);S.students.push({_docId:ref.id,...data});
    }
    closeModal();renderAdminStudents();
  }catch(e){showErr('mErr','저장 실패: '+e.message);}
  showLoad(false);}

async function delStu(docId){
  const s=S.students.find(x=>x._docId===docId);if(!s||!confirm(`'${s.name}' 학생을 삭제하시겠습니까?`))return;
  showLoad(true);
  try{
    await db.collection('students').doc(docId).delete();
    const related=S.bookings.filter(b=>b.studentId===docId);
    for(const b of related)await db.collection('bookings').doc(b._docId).delete();
    S.students=S.students.filter(x=>x._docId!==docId);S.bookings=S.bookings.filter(b=>b.studentId!==docId);
    renderAdminStudents();
  }catch(e){alert('삭제 실패: '+e.message);}
  showLoad(false);}

async function resetPw(docId){

async function saveExamForm(){

function openExamGradeCuts(examId){
  const ex=getExam(examId);if(!ex)return;
  const gc=ex.gradeCuts||{};const allRel=gcAllRel(ex);const groups=gcRelGroups(ex);
  let rows='';
  for(const [group,subjs,max] of groups){
    rows+=`<tr><td class="gc-grp" colspan="9">${group}</td></tr>`;
    for(const subj of subjs){rows+=gcCutRow('gc-'+allRel.indexOf(subj),subj,gc[subj],max);}
  }
  _('mCt').innerHTML=`<p style="font-size:16px;font-weight:700;margin-bottom:4px">${ex.name} 등급컷</p>
    <p style="font-size:12px;color:#6b7280;margin-bottom:14px">각 등급의 최저 원점수를 입력하세요.</p>
    <div style="overflow-x:auto"><table class="gc-tbl">${gcTblHeader()}${rows}</table></div>
    <div style="display:flex;gap:8px;margin-top:16px"><button class="btn bs" style="flex:1" onclick="closeModal();renderAdminExams()">취소</button><button class="btn bp" style="flex:1" onclick="saveExamGradeCutsFromModal('${examId}')">저장</button></div>`;openModal();}

async function saveExamGradeCutsFromModal(examId){
  const ex=getExam(examId);if(!ex)return;
  const allRel=gcAllRel(ex);ex.gradeCuts={};
  for(let si=0;si<allRel.length;si++){
    const subj=allRel[si],vals=[];let hasVal=false;
    for(let i=0;i<8;i++){const v=_('gc-'+si+'-'+i)?.value;vals.push(v!==''?Number(v):'');if(v!=='')hasVal=true;}
    if(hasVal)ex.gradeCuts[subj]=vals;
  }
  showLoad(true);
  try{await db.collection('config').doc('main').set(S.config);closeModal();renderAdminExams();alert('등급컷이 저장되었습니다.');}
  catch(e){alert('저장 실패: '+e.message);}
  showLoad(false);}

async function saveAbsGradeCuts(){
  if(!S.config.gradeCuts)S.config.gradeCuts={};
  if(!S.config.gradeCuts.abs)S.config.gradeCuts.abs={};
  for(const [key,,] of GC_ABS_SUBJS){
    const vals=[];let hasVal=false;
    for(let i=0;i<8;i++){const v=_('gca-'+key+'-'+i)?.value;vals.push(v!==''?Number(v):'');if(v!=='')hasVal=true;}
    if(hasVal)S.config.gradeCuts.abs[key]=vals;else delete S.config.gradeCuts.abs[key];
  }
  showLoad(true);
  try{await db.collection('config').doc('main').set(S.config);alert('절대평가 등급컷이 저장되었습니다.');}

  showLoad(false);}

async function confirmEditDate(id){
  const label=_('dl').value.trim(),newDate=_('dd').value;if(!label||!newDate){showErr('mErr','모두 입력하세요.');return;}
  const d=S.schedule.dates.find(x=>x.id===id);if(!d)return;
  const oldDate=d.date,related=S.bookings.filter(b=>b.date===oldDate);
  d.label=label;d.date=newDate;related.forEach(b=>{b.date=newDate;b.dateLabel=label;});
  showLoad(true);try{await saveScheduleToDb();for(const b of related)await db.collection('bookings').doc(b._docId).update({date:newDate,dateLabel:label});closeModal();renderAdminSchedule();}catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);}

async function rmDate(id){
  const d=S.schedule.dates.find(x=>x.id===id);if(!d||!confirm(`'${d.label}'를 삭제하시겠습니까? 관련 예약도 삭제됩니다.`))return;
  const related=S.bookings.filter(b=>b.date===d.date);S.schedule.dates=S.schedule.dates.filter(x=>x.id!==id);
  showLoad(true);try{await saveScheduleToDb();for(const b of related)await db.collection('bookings').doc(b._docId).delete();S.bookings=S.bookings.filter(b=>b.date!==d.date);renderAdminSchedule();}catch(e){alert('삭제 실패: '+e.message);}showLoad(false);}

async function addSlot(dateId){
  const val=document.getElementById('at-'+dateId)?.value;if(!val){alert('시간을 선택하세요.');return;}
  const d=S.schedule.dates.find(x=>x.id===dateId);if(!d)return;
  if(d.slots.includes(val)){alert('이미 추가된 시간입니다.');return;}
  d.slots.push(val);d.slots.sort();showLoad(true);try{await saveScheduleToDb();renderAdminSchedule();}catch(e){alert('저장 실패: '+e.message);}showLoad(false);}

async function rmSlot(dateId,slot){
  const d=S.schedule.dates.find(x=>x.id===dateId);if(!d)return;
  const bk=S.bookings.find(b=>b.date===d.date&&b.slot===slot);
  if(bk&&!confirm(`${slot}에 ${bk.studentName} 학생이 예약되어 있습니다. 삭제하시겠습니까?`))return;
  d.slots=d.slots.filter(s=>s!==slot);showLoad(true);
  try{await saveScheduleToDb();if(bk){await db.collection('bookings').doc(bk._docId).delete();S.bookings=S.bookings.filter(b=>b._docId!==bk._docId);}renderAdminSchedule();}
  catch(e){alert('저장 실패: '+e.message);}showLoad(false);}

function openBulk(dateId){_('mCt').innerHTML=`<p style="font-size:16px;font-weight:700;margin-bottom:4px">시간대 일괄 추가</p>
  <p style="font-size:12px;color:#6b7280;margin-bottom:4px">30분 단위로 자동 생성합니다.</p>
  <p style="font-size:11px;color:#9ca3af;margin-bottom:16px">⚠ 12:00, 12:30, 18:00, 18:30은 자동으로 제외됩니다.</p>
  <input type="hidden" id="bid" value="${dateId}">
  <div class="frow"><div class="fg"><label class="fl">시작 시간</label><input class="fi" id="bs" type="time" value="09:00"></div><div class="fg"><label class="fl">종료 시간 (미포함)</label><input class="fi" id="be" type="time" value="19:00"></div></div>
  <div class="ferr" id="mErr"></div>
  <div style="display:flex;gap:8px"><button class="btn bs" style="flex:1" onclick="closeModal()">취소</button><button class="btn bp" style="flex:1" onclick="doBulk()">추가</button></div>`;openModal();}

async function doBulk(){
  const dateId=_('bid').value,start=_('bs').value,end=_('be').value;
  if(!start||!end||start>=end){showErr('mErr','올바른 시간 범위를 입력하세요.');return;}
  const d=S.schedule.dates.find(x=>x.id===dateId);if(!d)return;
  let [h,m]=start.split(':').map(Number);const [eh,em]=end.split(':').map(Number),endMin=eh*60+em;
  let added=0,skipped=0;
  while(h*60+m<endMin){const sl=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}`;if(EXCL.includes(sl))skipped++;else if(!d.slots.includes(sl)){d.slots.push(sl);added++;}m+=30;if(m>=60){m-=60;h++;}}
  d.slots.sort();showLoad(true);try{await saveScheduleToDb();closeModal();renderAdminSchedule();alert(`${added}개 추가됨${skipped?` (${skipped}개 제외)`:''}`);} catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);}

    const typeLabel=r.type==='cancel'?'<span class="bx br">취소</span>':'<span class="bx bb">변경</span>';
    const changeInfo=r.type==='change'?`<br><span style="font-size:11px;color:#1C64F2">→ ${r.newDateLabel} ${r.newSlot}</span>`:'';
    return `<tr><td>${typeLabel}</td><td style="font-weight:600">${r.studentName}</td>

  const isAdmin=S.user.type==='admin';
  const resolvedRows=resolved.map(r=>{
    const typeLabel=r.type==='cancel'?'<span class="bx br">취소</span>':'<span class="bx bb">변경</span>';
    const statusLabel=r.status==='approved'?'<span class="bx bg">승인</span>':'<span class="bx bgr">거절</span>';
    return `<tr><td>${typeLabel}</td><td style="font-weight:600">${r.studentName}</td>
      <td style="font-size:12px">${r.currentDateLabel} ${r.currentSlot}</td>
      <td style="font-size:12px;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap" title="${(r.reason||'').replace(/"/g,'&quot;')}">${r.reason||'—'}</td>
      <td>${statusLabel}${r.status==='rejected'&&r.rejectReason?`<span style="font-size:10px;color:#6b7280;display:block;margin-top:2px" title="${r.rejectReason.replace(/"/g,'&quot;')}">${r.rejectReason.length>10?r.rejectReason.slice(0,10)+'…':r.rejectReason}</span>`:''}</td>

      ${isAdmin?`<td><button class="btn bd bsm" onclick="deleteRequest('${r._docId}')">삭제</button></td>`:''}</tr>`;}).join('');

  const toggleBtn=`<button class="btn ${reqEnabled?'bd':'bp'} bsm" onclick="toggleRequestEnabled()">${toggleLabel}</button>`;

async function approveRequest(reqId){
  const req=S.requests.find(r=>r._docId===reqId);if(!req)return;
  const typeLabel=req.type==='cancel'?'취소':'변경';
  if(!confirm(`${req.studentName} 학생의 예약 ${typeLabel} 요청을 승인하시겠습니까?`))return;
  showLoad(true);
  try{
    if(req.type==='cancel'){
      await db.collection('bookings').doc(req.bookingId).delete();
      S.bookings=S.bookings.filter(b=>b._docId!==req.bookingId);
    }else if(req.type==='change'){
      const taken=S.bookings.filter(b=>b.date===req.newDate&&b._docId!==req.bookingId).map(b=>b.slot);
      if(taken.includes(req.newSlot)){alert('해당 시간이 이미 예약되어 있습니다. 승인할 수 없습니다.');showLoad(false);return;}
      await db.collection('bookings').doc(req.bookingId).update({date:req.newDate,dateLabel:req.newDateLabel,slot:req.newSlot});
      const b=S.bookings.find(x=>x._docId===req.bookingId);if(b){b.date=req.newDate;b.dateLabel=req.newDateLabel;b.slot=req.newSlot;}
    }
    await db.collection('requests').doc(reqId).update({status:'approved'});
    req.status='approved';
    renderAdminBookings();
  }catch(e){alert('승인 실패: '+e.message);}
  showLoad(false);}

function rejectRequest(reqId){
  const req=S.requests.find(r=>r._docId===reqId);if(!req)return;
  const typeLabel=req.type==='cancel'?'취소':'변경';
  _('mCt').innerHTML=`<p style="font-size:16px;font-weight:700;margin-bottom:4px">예약 ${typeLabel} 요청 거절</p>
    <p style="font-size:13px;color:#6b7280;margin-bottom:16px">${req.studentName} 학생</p>
    <div style="background:#f9fafb;border-radius:10px;padding:12px;margin-bottom:14px"><p style="font-size:13px">현재 예약: <b>${req.currentDateLabel} ${req.currentSlot}</b></p>${req.type==='change'?`<p style="font-size:13px;margin-top:4px">변경 희망: <b style="color:#1C64F2">${req.newDateLabel} ${req.newSlot}</b></p>`:''}<p style="font-size:12px;color:#6b7280;margin-top:4px">학생 사유: ${req.reason}</p></div>
    <div class="fg"><label class="fl">거절 사유</label><textarea class="fi ta" id="rejectReason" rows="3" placeholder="거절 사유를 입력해주세요. (선택)"></textarea></div>
    <div style="display:flex;gap:8px"><button class="btn bs" style="flex:1" onclick="closeModal()">취소</button><button class="btn bd" style="flex:1" onclick="confirmReject('${reqId}')">거절</button></div>`;
  openModal();}

async function confirmReject(reqId){
  const req=S.requests.find(r=>r._docId===reqId);if(!req)return;
  const rejectReason=_('rejectReason')?.value?.trim()||'';
  showLoad(true);
  try{
    await db.collection('requests').doc(reqId).update({status:'rejected',rejectReason});
    req.status='rejected';req.rejectReason=rejectReason;
    closeModal();renderAdminBookings();
  }catch(e){alert('거절 실패: '+e.message);}
  showLoad(false);}

async function deleteRequest(reqId){
  if(!confirm('이 요청 기록을 삭제하시겠습니까?'))return;
  showLoad(true);
  try{await db.collection('requests').doc(reqId).delete();S.requests=S.requests.filter(r=>r._docId!==reqId);renderAdminBookings();}
  catch(e){alert('삭제 실패: '+e.message);}
  showLoad(false);}

async function toggleRequestEnabled(){
  const cur=S.config.requestEnabled!==false;
  S.config.requestEnabled=!cur;
  showLoad(true);
  try{await db.collection('config').doc('main').set(S.config);renderAdminBookings();}
  catch(e){alert('설정 저장 실패: '+e.message);S.config.requestEnabled=cur;}
  showLoad(false);}

  const scoreData={korSubj,korRaw,korGrade:getExamGrade(exam,korSubj,korRaw),matSubj,matRaw,matGrade:getExamGrade(exam,matSubj,matRaw),engRaw,engGrade:getAbsGrade('eng',engRaw),hisRaw,hisGrade:getAbsGrade('his',hisRaw),exp1Subj,exp1Raw,exp1Grade:getExamGrade(exam,exp1Subj,exp1Raw),exp2Subj,exp2Raw,exp2Grade:getExamGrade(exam,exp2Subj,exp2Raw)};

async function saveAcct(accId){
  const name=_('acname').value.trim(),role=_('acrole').value,pw=_('acpw')?.value;
  if(!name){showErr('mErr','이름을 입력하세요.');return;}
  if(accId){
    const update={name,role};if(pw){if(pw.length<6){showErr('mErr','비밀번호는 6자 이상이어야 합니다.');return;}update.password=pw;}
    showLoad(true);try{await db.collection('admins').doc(accId).update(update);const a=S.admins.find(x=>x.id===accId);if(a)Object.assign(a,update);closeModal();renderAdminAccounts();}catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);
  }else{
    const id=_('acid').value.trim();if(!id){showErr('mErr','ID를 입력하세요.');return;}if(!pw||pw.length<6){showErr('mErr','비밀번호는 6자 이상이어야 합니다.');return;}
    showLoad(true);
    try{
      const exists=await db.collection('admins').doc(id).get();if(exists.exists){showErr('mErr',`ID '${id}'가 이미 존재합니다.`);showLoad(false);return;}
      const data={id,name,role,password:pw,createdAt:Date.now()};
      await db.collection('admins').doc(id).set(data);S.admins.push({_docId:id,...data});closeModal();renderAdminAccounts();
    }catch(e){showErr('mErr','저장 실패: '+e.message);}showLoad(false);}
}

async function delAcct(id){
  if(id===S.user.id){alert('본인 계정은 삭제할 수 없습니다.');return;}
  if(!confirm(`'${id}' 계정을 삭제하시겠습니까?`))return;
  showLoad(true);try{await db.collection('admins').doc(id).delete();S.admins=S.admins.filter(x=>x.id!==id);renderAdminAccounts();}catch(e){alert('삭제 실패: '+e.message);}showLoad(false);}

/* ── MODAL ── */
function openModal(){const ov=_('mOv');ov.classList.remove('hidden');ov.style.display='flex';}
function closeModal(){const ov=_('mOv');ov.classList.add('hidden');ov.style.display='none';}

/* ── INIT ── */
async function init(){
  showLoad(true);
  try{
    const snap=await db.collection('admins').limit(1).get();
    if(snap.empty){showLoad(false);showView('vSetup');return;}
    const saved=sessionStorage.getItem('session');
    if(saved){
      const sess=JSON.parse(saved);
      if(sess.type==='student'){
        const stuQ=await db.collection('students').where('accountId','==',sess.id).get();
        if(!stuQ.empty){
          S.user={type:'student',id:sess.id,name:sess.name};
          S.studentDocId=stuQ.docs[0].id;
          await loadAll();
          const stu=stuQ.docs[0].data();
          if(stu.isFirstLogin){showLoad(false);showView('vCpw');return;}
          _('stuUname').textContent=sess.name+' 학생';
          showLoad(false);showView('vStu');renderStu();return;
        }
      }else{
        const adminDoc=await db.collection('admins').doc(sess.id).get();
        if(adminDoc.exists){
          const a=adminDoc.data();
          S.user={type:a.role,id:a.id,name:a.name};
          await loadAll();
          _('adminUname').textContent=a.name;
          _('adminRoleLabel').textContent=a.role==='admin'?'ADMIN':'OP';
          showLoad(false);showView('vAdmin');
          setTab(a.role==='admin'?'students':'bookings');return;
        }
      }
      sessionStorage.removeItem('session');
    }
    showLoad(false);showView('vLogin');
  }catch(e){
    _('vLoad').innerHTML=`<div style="text-align:center;padding:40px"><p style="font-size:16px;font-weight:700;color:#dc2626;margin-bottom:8px">Firestore 연결 실패</p><p style="font-size:13px;color:#6b7280">${e.message}</p><p style="font-size:12px;color:#9ca3af;margin-top:8px">Firebase 콘솔에서 Firestore 규칙을 확인해주세요.</p></div>`;
    _('vLoad').style.display='flex';}
}
init();
</script>
